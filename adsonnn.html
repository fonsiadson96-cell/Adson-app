<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adsonnn — AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b10;
      --surface: #0e1219;
      --surface2: #151b25;
      --border: rgba(255,255,255,0.07);
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --text: #e8edf5;
      --text-dim: #6b7a90;
      --user-bubble: #1a2236;
      --ai-bubble: #0e1219;
      --glow: rgba(0,229,255,0.15);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb1 { width: 500px; height: 500px; background: rgba(0,229,255,0.06); top: -150px; right: -100px; }
    .orb2 { width: 400px; height: 400px; background: rgba(124,58,237,0.08); bottom: -100px; left: -80px; animation-delay: -6s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }

    /* ─── HEADER ─── */
    header {
      position: relative; z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,11,16,0.85);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
      font-size: 14px;
      color: #fff;
      letter-spacing: -0.05em;
      box-shadow: 0 0 20px rgba(0,229,255,0.3);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .logo-text span { color: var(--accent); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(0,229,255,0.15);
      border-radius: 999px;
      padding: 6px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .status-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    .new-chat-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .new-chat-btn:hover { background: var(--surface); color: var(--text); border-color: rgba(255,255,255,0.12); }

    /* ─── MAIN CHAT AREA ─── */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar { width: 4px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .messages-wrap {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* ─── WELCOME SCREEN ─── */
    .welcome {
      text-align: center;
      padding: 60px 20px 20px;
      animation: fadeIn 0.6s ease forwards;
    }

    .welcome-icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(124,58,237,0.15));
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      font-size: 36px;
      box-shadow: 0 0 40px rgba(0,229,255,0.1);
    }

    .welcome h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 12px;
    }

    .welcome h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .welcome p {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.7;
      max-width: 440px;
      margin: 0 auto 40px;
    }

    .starter-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      max-width: 560px;
      margin: 0 auto;
    }

    .starter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }

    .starter-btn:hover {
      background: var(--surface2);
      border-color: rgba(0,229,255,0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .starter-btn .s-icon {
      font-size: 20px;
      margin-bottom: 8px;
      display: block;
    }

    .starter-btn .s-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: block;
      margin-bottom: 4px;
    }

    .starter-btn .s-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      display: block;
    }

    /* ─── MESSAGE BUBBLES ─── */
    .message {
      display: flex;
      gap: 14px;
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .avatar.ai {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 0 16px rgba(0,229,255,0.25);
      font-size: 12px;
    }

    .avatar.user {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .bubble-wrap { flex: 1; max-width: calc(100% - 48px); }

    .bubble-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 7px;
      letter-spacing: 0.05em;
    }

    .message.user .bubble-name { text-align: right; }

    .bubble {
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
      position: relative;
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(0,229,255,0.1);
      border-top-right-radius: 4px;
      margin-left: auto;
    }

    .bubble p { margin-bottom: 12px; }
    .bubble p:last-child { margin-bottom: 0; }

    .bubble strong { color: var(--accent); font-weight: 600; }

    .bubble code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      background: rgba(0,229,255,0.07);
      border: 1px solid rgba(0,229,255,0.12);
      padding: 2px 7px;
      border-radius: 5px;
      color: var(--accent);
    }

    .bubble pre {
      background: #040608;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .bubble ul, .bubble ol {
      padding-left: 22px;
      margin: 8px 0;
    }

    .bubble li { margin-bottom: 6px; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-top-left-radius: 4px;
      width: fit-content;
    }

    .typing-dot {
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingBounce 1.2s ease-in-out infinite;
      opacity: 0.5;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── INPUT AREA ─── */
    .input-area {
      position: relative; z-index: 10;
      padding: 16px 20px 20px;
      background: rgba(8,11,16,0.9);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 720px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 12px 12px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: rgba(0,229,255,0.25);
      box-shadow: 0 0 30px rgba(0,229,255,0.06);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      resize: none;
      max-height: 180px;
      overflow-y: auto;
      padding: 4px 0;
    }

    #user-input::placeholder { color: var(--text-dim); }

    #user-input::-webkit-scrollbar { width: 3px; }
    #user-input::-webkit-scrollbar-thumb { background: var(--border); }

    .send-btn {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 0 16px rgba(0,229,255,0.2);
    }

    .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 24px rgba(0,229,255,0.35); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .input-footer {
      max-width: 720px;
      margin: 10px auto 0;
      display: flex;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      opacity: 0.5;
    }

    /* Error toast */
    .error-toast {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      margin-top: 8px;
      display: none;
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }

    @media (max-width: 600px) {
      .starter-grid { grid-template-columns: 1fr; }
      header { padding: 0 16px; }
      .chat-container { padding: 24px 12px; }
      .input-area { padding: 12px 12px 16px; }
    }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <!-- HEADER -->
  <header>
    <div class="logo-area">
      <div class="logo-mark">A</div>
      <div class="logo-text">Adson<span>nn</span></div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Online
    </div>
    <button class="new-chat-btn" onclick="clearChat()">+ New Chat</button>
  </header>

  <!-- CHAT -->
  <div class="chat-container" id="chat-container">
    <div class="messages-wrap" id="messages">

      <!-- Welcome screen -->
      <div class="welcome" id="welcome-screen">
        <div class="welcome-icon">🤖</div>
        <h1>Hello, I'm <em>Adsonnn</em></h1>
        <p>Your intelligent AI companion — ask me anything, from creative ideas to complex questions.</p>
        <div class="starter-grid">
          <button class="starter-btn" onclick="sendStarter(this)">
            <span class="s-icon">💡</span>
            <span class="s-text">Brainstorm ideas</span>
            <span class="s-sub">for my next project</span>
          </button>
          <button class="starter-btn" onclick="sendStarter(this)">
            <span class="s-icon">✍️</span>
            <span class="s-text">Help me write</span>
            <span class="s-sub">content or copy</span>
          </button>
          <button class="starter-btn" onclick="sendStarter(this)">
            <span class="s-icon">📊</span>
            <span class="s-text">Explain a concept</span>
            <span class="s-sub">in simple terms</span>
          </button>
          <button class="starter-btn" onclick="sendStarter(this)">
            <span class="s-icon">🚀</span>
            <span class="s-text">Plan a business</span>
            <span class="s-sub">or strategy</span>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="Message Adsonnn…" rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="error-toast" id="error-toast"></div>
    <div class="input-footer">Adsonnn · Powered by Claude · Press Enter to send</div>
  </div>

  <script>
    const SYSTEM_PROMPT = `You are Adsonnn, a sharp, helpful, and charismatic AI assistant. You are direct, thoughtful, and a little bold. You help with anything — creative work, strategy, writing, coding, research, life advice, and beyond.

Your personality:
- Confident but never arrogant
- Clear and concise, but rich when depth is needed
- You occasionally show warmth and wit
- You are forward-thinking and entrepreneurial in spirit

Always respond in a helpful, engaging way. Format longer responses with clear structure when appropriate.`;

    let conversationHistory = [];
    let isLoading = false;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const chatContainer = document.getElementById('chat-container');
    const errorToast = document.getElementById('error-toast');

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
    });

    // Enter to send (Shift+Enter for newline)
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function sendStarter(btn) {
      const text = btn.querySelector('.s-text').textContent + ' ' + btn.querySelector('.s-sub').textContent;
      inputEl.value = text;
      inputEl.dispatchEvent(new Event('input'));
      sendMessage();
    }

    function clearChat() {
      conversationHistory = [];
      messagesEl.innerHTML = `
        <div class="welcome" id="welcome-screen">
          <div class="welcome-icon">🤖</div>
          <h1>Hello, I'm <em>Adsonnn</em></h1>
          <p>Your intelligent AI companion — ask me anything, from creative ideas to complex questions.</p>
          <div class="starter-grid">
            <button class="starter-btn" onclick="sendStarter(this)">
              <span class="s-icon">💡</span>
              <span class="s-text">Brainstorm ideas</span>
              <span class="s-sub">for my next project</span>
            </button>
            <button class="starter-btn" onclick="sendStarter(this)">
              <span class="s-icon">✍️</span>
              <span class="s-text">Help me write</span>
              <span class="s-sub">content or copy</span>
            </button>
            <button class="starter-btn" onclick="sendStarter(this)">
              <span class="s-icon">📊</span>
              <span class="s-text">Explain a concept</span>
              <span class="s-sub">in simple terms</span>
            </button>
            <button class="starter-btn" onclick="sendStarter(this)">
              <span class="s-icon">🚀</span>
              <span class="s-text">Plan a business</span>
              <span class="s-sub">or strategy</span>
            </button>
          </div>
        </div>`;
      errorToast.style.display = 'none';
    }

    function hideWelcome() {
      const w = document.getElementById('welcome-screen');
      if (w) w.remove();
    }

    function appendMessage(role, content) {
      hideWelcome();
      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatarContent = role === 'ai' ? 'AI' : 'You';
      const nameLabel = role === 'ai' ? 'Adsonnn' : 'You';

      msg.innerHTML = `
        <div class="avatar ${role}">${avatarContent}</div>
        <div class="bubble-wrap">
          <div class="bubble-name">${nameLabel}</div>
          <div class="bubble">${content}</div>
        </div>`;

      messagesEl.appendChild(msg);
      scrollToBottom();
      return msg;
    }

    function showTyping() {
      hideWelcome();
      const msg = document.createElement('div');
      msg.className = 'message ai';
      msg.id = 'typing-msg';
      msg.innerHTML = `
        <div class="avatar ai">AI</div>
        <div class="bubble-wrap">
          <div class="bubble-name">Adsonnn</div>
          <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>`;
      messagesEl.appendChild(msg);
      scrollToBottom();
    }

    function removeTyping() {
      const t = document.getElementById('typing-msg');
      if (t) t.remove();
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function formatText(text) {
      // Basic markdown-like formatting
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/^### (.+)$/gm, '<h3 style="font-size:1rem;color:var(--accent);margin:14px 0 6px;font-weight:700;">$1</h3>')
        .replace(/^## (.+)$/gm, '<h2 style="font-size:1.1rem;color:var(--text);margin:16px 0 8px;font-weight:700;">$1</h2>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/gs, m => `<ul>${m}</ul>`)
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br/>')
        .replace(/^(.+)$/, '<p>$1</p>');
    }

    function showError(msg) {
      errorToast.textContent = '⚠ ' + msg;
      errorToast.style.display = 'block';
      setTimeout(() => { errorToast.style.display = 'none'; }, 6000);
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      errorToast.style.display = 'none';

      // Add to UI
      appendMessage('user', formatText(text));

      // Add to history
      conversationHistory.push({ role: 'user', content: text });

      // Clear input
      inputEl.value = '';
      inputEl.style.height = 'auto';

      showTyping();

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: conversationHistory
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error?.message || 'API error ' + response.status);
        }

        const reply = data.content?.[0]?.text || '';
        conversationHistory.push({ role: 'assistant', content: reply });

        removeTyping();
        appendMessage('ai', formatText(reply));

      } catch (err) {
        removeTyping();
        showError(err.message || 'Something went wrong. Please try again.');
        // Remove last user message from history on error
        conversationHistory.pop();
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    // Focus input on load
    inputEl.focus();
  </script>
